configuration:
  openai_api_key:
    name: OpenAI API key
    description: API key used by Documentarian agent and ingestion workflows.
  openai_model:
    name: Default model
    description: Default OpenAI model for main agent turns.
  log_level:
    name: Log level
    description: Application log verbosity.
  home_assistant_mcp_url:
    name: Home Assistant MCP URL
    description: Optional OpenAI-reachable HTTPS MCP URL, such as a Secure MCP Tunnel endpoint.
  home_assistant_mcp_auto_detect:
    name: Auto-detect Home Assistant MCP
    description: Probe Supervisor for the ha-mcp add-on and show a configuration prompt when a remote MCP URL is needed.
network:
  8099/tcp: Documentarian ingress web interface
